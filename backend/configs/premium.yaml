# ══════════════════════════════════════════════════════════════════════
# Mode PREMIUM — OpenAI + Pinecone + Cohere
# Requiert : OPENAI_API_KEY, COHERE_API_KEY, PINECONE_API_KEY
# ══════════════════════════════════════════════════════════════════════

# Modèle d'embedding (OpenAI, haute qualité, 3072 dimensions)
embedder:
  name: "openai"
  params:
    api_key: "${OPENAI_API_KEY}"
    model: "text-embedding-3-large"
    dimensions: 3072

# Base de données vectorielle (Pinecone, managée, scalable)
vector_store:
  name: "pinecone"
  params:
    api_key: "${PINECONE_API_KEY}"
    environment: "${PINECONE_ENVIRONMENT}"
    index_name: "rag-documents"
    dimension: 3072
    metric: "cosine"
    create_index_if_missing: true

# Chunker sémantique — regroupe les phrases par similarité de sens
chunker:
  name: "semantic_chunker"
  params:
    model_name: "BAAI/bge-large-en-v1.5"
    breakpoint_threshold: 0.35
    max_chunk_size: 1400
    min_chunk_size: 100

# Composant de récupération
retriever:
  name: "vector_retriever"
  params:
    search_type: "similarity"
    score_threshold: 0.5
    top_k: 20

# Reranking Cohere (meilleure qualité)
reranker:
  name: "cohere"
  params:
    api_key: "${COHERE_API_KEY}"
    model: "rerank-english-v3.0"
    top_n: 5

# Gestionnaire de prompts
prompt_managers:
  name: "default"
  params: {}

# Modèle de génération (GPT-4o)
llm:
  name: "openai"
  params:
    api_key: "${OPENAI_API_KEY}"
    model: "gpt-4o"
    temperature: 0.7
    max_tokens: 2000

# Modèles disponibles — exposés via GET /models (utilisé par le frontend)
models:
  - id: "gpt-4o"
    label: "GPT-4o (OpenAI)"
    provider: "openai"
    default: true
  - id: "gpt-4-turbo"
    label: "GPT-4 Turbo (OpenAI)"
    provider: "openai"
    default: false
  - id: "gpt-3.5-turbo"
    label: "GPT-3.5 Turbo (OpenAI)"
    provider: "openai"
    default: false

# Configuration du pipeline
pipeline_config:
  name: "premium_rag_pipeline"
  version: "1.0.0"
  default_top_k: 15
  default_rerank_top_k: 5
  enable_caching: true
  log_level: "INFO"

  # Métriques estimées
  estimated_cost_per_query: 0.10  # USD
  expected_latency: 1.5           # secondes
