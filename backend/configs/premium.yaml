# Modèle d'embedding (payant, meilleur qualité)
embedder:
  name: "openai"
  params:
    api_key: "${OPENAI_API_KEY}"
    model: "text-embedding-3-large"  # 3072 dimensions
    dimensions: 3072  # Optionnel: réduire si besoin

# Base de données vectorielle (payante, managed, scalable)
vector_store:
  name: "pinecone"
  params:
    api_key: "${PINECONE_API_KEY}"
    environment: "${PINECONE_ENVIRONMENT}"
    index_name: "rag-documents"
    dimension: 3072  # Doit correspondre à l'embedder
    metric: "cosine"
    # Configuration du pod
    pod_type: "p1.x1"  # ou "s1.x1" pour starter

# Composant de récupération
retriever:
  name: "vector_retriever"
  params:
    search_type: "similarity"
    score_threshold: 0.5
    fetch_k: 20
    # Métadonnées pour filtrage
    include_metadata: true

# Query Rewriting (avec GPT-4)
query_rewriter:
  name: "llm_rewriter"
  params:
    num_variations: 3
    temperature: 0.8
    use_gpt4: true  # Utilise GPT-4 pour rewriting

# Reranking (Cohere, le meilleur)
reranker:
  name: "cohere"
  params:
    api_key: "${COHERE_API_KEY}"
    model: "rerank-english-v3.0"
    top_n: 5
    return_documents: true

# Modèle de génération (GPT-4 ou Claude Opus)
llm:
  name: "openai"
  params:
    api_key: "${OPENAI_API_KEY}"
    model: "gpt-4"  # ou "gpt-4-turbo" pour plus de rapidité
    temperature: 0.7
    max_tokens: 2000
    top_p: 0.95
    frequency_penalty: 0.0
    presence_penalty: 0.0

# Alternative: Claude Opus (décommenter pour utiliser)
# llm:
#   name: "anthropic"
#   params:
#     api_key: "${ANTHROPIC_API_KEY}"
#     model: "claude-opus-4-5-20251101"
#     temperature: 0.7
#     max_tokens: 2000

# Configuration du pipeline
pipeline_config:
  name: "premium_rag_pipeline"
  version: "1.0.0"
  default_top_k: 15
  default_rerank_top_k: 5
  enable_caching: true
  log_level: "INFO"
  
  # Optimisations
  use_async: true
  parallel_queries: true
  cache_ttl: 3600  # 1 heure
  
  # Métriques estimées
  estimated_cost_per_query: 0.10  # USD
  expected_latency: 1.5  # secondes


