# Configuration du pipeline
pipeline_config:
  name: "huggingface_test_pipeline"
  version: "1.0.0"
  prompt_version: "1.0"
  default_top_k: 5
  default_rerank_top_k: 3
  enable_caching: false   # Désactivé pour avoir des résultats frais
  log_level: "DEBUG"      # DEBUG pour voir les détails pendant les tests

